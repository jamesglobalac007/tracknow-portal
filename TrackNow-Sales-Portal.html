        // ─── STATE MANAGEMENT ───────────────────────────────────────────
        class App {
            constructor() {
                this.state = {
                    activePage: 'dashboard',
                    viewMode: 'board',
                    sidebarExpanded: true,
                    filterIndustry: 'All',
                    filterState: 'All States',
                    searchIndustry: 'Transport & Logistics',
                    searchState: 'QLD',
                    isSearching: false,
                    hasResults: false,
                    selectedResults: [],
                    outreachActiveTab: 'campaigns',
                    leads: SAMPLE_LEADS,
                };
                this.render();
                this.attachEventListeners();
            }

            setState(newState) {
                this.state = { ...this.state, ...newState };
                this.render();
                this.attachEventListeners();
            }

            attachEventListeners() {
                // Sidebar navigation
                document.querySelectorAll('[data-page]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.setState({ activePage: e.currentTarget.dataset.page });
                    });
                });

                // Sidebar collapse
                const collapseBtn = document.getElementById('collapse-sidebar');
                if (collapseBtn) {
                    collapseBtn.addEventListener('click', () => {
                        this.setState({ sidebarExpanded: !this.state.sidebarExpanded });
                    });
                }

                // Pipeline view mode
                document.querySelectorAll('[data-view-mode]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.setState({ viewMode: e.currentTarget.dataset.viewMode });
                    });
                });

                // Outreach tabs
                document.querySelectorAll('[data-outreach-tab]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.setState({ outreachActiveTab: e.currentTarget.dataset.outreachTab });
                    });
                });

                // Pipeline filters
                const industrySelect = document.getElementById('filter-industry');
                const stateSelect = document.getElementById('filter-state');
                if (industrySelect) {
                    industrySelect.addEventListener('change', (e) => {
                        this.setState({ filterIndustry: e.target.value });
                    });
                }
                if (stateSelect) {
                    stateSelect.addEventListener('change', (e) => {
                        this.setState({ filterState: e.target.value });
                    });
                }

                // Scraper search
                const searchBtn = document.getElementById('scraper-search-btn');
                if (searchBtn) {
                    searchBtn.addEventListener('click', () => {
                        this.setState({ isSearching: true });
                        setTimeout(() => {
                            this.setState({ isSearching: false, hasResults: true });
                        }, 1500);
                    });
                }

                // Scraper result checkboxes
                document.querySelectorAll('[data-result-checkbox]').forEach((cb, idx) => {
                    cb.addEventListener('change', () => {
                        const selected = this.state.selectedResults;
                        const newSelected = selected.includes(idx)
                            ? selected.filter(i => i !== idx)
                            : [...selected, idx];
                        this.setState({ selectedResults: newSelected });
                    });
                });

                // Select all scraper results
                const selectAllCheckbox = document.getElementById('select-all-results');
                if (selectAllCheckbox) {
                    selectAllCheckbox.addEventListener('change', () => {
                        if (this.state.selectedResults.length === SCRAPER_RESULTS.length) {
                            this.setState({ selectedResults: [] });
                        } else {
                            this.setState({ selectedResults: SCRAPER_RESULTS.map((_, i) => i) });
                        }
                    });
                }
            }

                const app = document.getElementById('app');
                app.innerHTML = this.renderApp();
            }

                                    </div>
                                    <div class="mt-4 w-full h-2 bg-gray-100 rounded-full overflow-hidden flex">
                                        <div class="h-full bg-blue-500" style="width: ${(c.opened / c.sent) * 100}%"></div>
                                        <div class="h-full bg-yellow-400" style="width: ${((c.clicked - 0) / c.sent) * 100}%"></div>
                                        <div class="h-full bg-green-500" style="width: ${(c.replies / c.sent) * 100}%"></div>
                                    </div>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            renderInfoPacks() {
                return `
                    <div class="grid grid-cols-2 gap-4">
                        ${INFO_PACKS.map(pack => `
                            <div class="bg-white rounded-xl border border-gray-200 p-5 flex items-center gap-4">
                                <div class="w-14 h-14 rounded-xl bg-red-50 flex items-center justify-center text-red-600 text-2xl">
                                    📄
                                </div>
                                <div class="flex-1">
                                    <p class="text-sm font-semibold text-gray-900">${pack.name}</p>
                                    <p class="text-xs text-gray-400 mt-0.5">${pack.file}</p>
                                    <div class="flex items-center gap-4 mt-2">
                                        <span class="text-xs text-gray-500">📤 ${pack.sends} sent</span>
                                        <span class="text-xs text-gray-500">👁️ ${pack.views} viewed</span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-1">
                                    <button class="px-3 py-1.5 bg-red-600 text-white text-xs font-medium rounded-lg hover:bg-red-700">Send</button>
                                    <button class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400">👁️</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            renderTemplates() {
                const templates = [
                    { name: "Initial Outreach — GPS Tracking Intro", subject: "Reduce Fleet Costs by 20% with Live GPS Tracking", type: "Cold outreach" },
                    { name: "Follow-Up #1 — Info Pack Delivery", subject: "Your TrackNow GPS Info Pack is Here", type: "Follow-up" },
                    { name: "Follow-Up #2 — Demo Invitation", subject: "See TrackNow in Action — Free Demo", type: "Follow-up" },
                    { name: "Industry-Specific — Construction", subject: "Track Your Machines, Cut Downtime — GPS for Civil Equipment", type: "Industry" },
                    { name: "Win-Back — Lapsed Prospects", subject: "Still Looking for Fleet Tracking? Special Offer Inside", type: "Re-engagement" },
                ];
                return `
                    <div class="space-y-4">
                        ${templates.map((t, i) => `
                            <div class="bg-white rounded-xl border border-gray-200 p-4 flex items-center gap-4 hover:border-red-200 cursor-pointer">
                                <div class="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center text-2xl">
                                    ✉️
                                </div>
                                <div class="flex-1">
                                    <p class="text-sm font-semibold text-gray-900">${t.name}</p>
                                    <p class="text-xs text-gray-400 mt-0.5">Subject: ${t.subject}</p>
                                </div>
                                <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${t.type}</span>
                                <button class="p-2 rounded-lg hover:bg-gray-100 text-gray-400">✏️</button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            renderAnalytics() {
                const CHART_COLORS = ["#DC2626", "#B91C1C", "#991B1B", "#7F1D1D", "#450A0A", "#1F2937", "#374151", "#4B5563"];

                return `
                    <div class="space-y-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <h1 class="text-2xl font-bold text-gray-900">Analytics & Insights</h1>
                                <p class="text-sm text-gray-500 mt-1">Market analysis, growth tracking, and sector breakdown across Australia.</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <select class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-600 bg-white">
                                    <option>Last 6 months</option>
                                    <option>Last 3 months</option>
                                    <option>Last 12 months</option>
                                    <option>This year</option>
                                </select>
                                <button class="flex items-center gap-1.5 px-3 py-2 border border-gray-200 text-gray-600 text-sm rounded-lg hover:bg-gray-50">
                                    ⬇️ Export Report
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-4 gap-4">
                            ${this.renderKPICard('Conversion Rate', '22.2%', '+5.3%', 'up', '📈', '#10B981')}
                            ${this.renderKPICard('Avg Deal Size', '$15.4K', '+18%', 'up', '🎯', '#DC2626')}
                            ${this.renderKPICard('Time to Close', '18 days', '-3 days', 'up', '🕐', '#3B82F6')}
                            ${this.renderKPICard('Monthly Revenue', '$36K', '+25%', 'up', '📈', '#8B5CF6')}
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white rounded-xl border border-gray-200 p-5">
                                <h3 class="text-sm font-semibold text-gray-700 mb-4">Revenue Growth (Monthly Recurring)</h3>
                                <div class="h-80 bg-gray-50 rounded-lg flex items-center justify-center text-gray-500">
                                    📊 Revenue chart
                                </div>
                            </div>
                            <div class="bg-white rounded-xl border border-gray-200 p-5">
                                <h3 class="text-sm font-semibold text-gray-700 mb-4">Leads by State</h3>
                                <div class="h-80 bg-gray-50 rounded-lg flex items-center justify-center text-gray-500">
                                    📊 Leads by State chart
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white rounded-xl border border-gray-200 p-5">
                                <h3 class="text-sm font-semibold text-gray-700 mb-4">Conversion Funnel</h3>
                                <div class="space-y-3">
                                    ${[
                                        { label: "New Leads", count: 171, pct: 100, color: "#6B7280" },
                                        { label: "Contacted", count: 136, pct: 79.5, color: "#3B82F6" },
                                        { label: "Interested", count: 82, pct: 47.9, color: "#F59E0B" },
                                        { label: "Demo Booked", count: 48, pct: 28.1, color: "#8B5CF6" },
                                        { label: "Proposal Sent", count: 31, pct: 18.1, color: "#EC4899" },
                                        { label: "Closed Won", count: 21, pct: 12.3, color: "#10B981" },
                                    ].map((item, i) => `
                                        <div class="flex items-center gap-3">
                                            <span class="text-xs text-gray-500 w-28 text-right">${item.label}</span>
                                            <div class="flex-1 h-8 bg-gray-50 rounded-lg overflow-hidden">
                                                <div class="h-full rounded-lg flex items-center px-3" style="width: ${item.pct}%; background-color: ${item.color}20; border-left: 3px solid ${item.color}">
                                                    <span class="text-xs font-semibold" style="color: ${item.color}">${item.count}</span>
                                                </div>
                                            </div>
                                            <span class="text-xs text-gray-400 w-12">${item.pct}%</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="bg-white rounded-xl border border-gray-200 p-5">
                                <h3 class="text-sm font-semibold text-gray-700 mb-4">Top Performing Industries</h3>
                                <div class="h-64 bg-gray-50 rounded-lg flex items-center justify-center text-gray-500 mb-4">
                                    📊 Industries pie chart
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    ${INDUSTRIES.slice(0, 6).map((ind, i) => `
                                        <div class="flex items-center gap-2 text-xs">
                                            <div class="w-2.5 h-2.5 rounded-full" style="background-color: ${CHART_COLORS[i]}"></div>
                                            <span class="text-gray-600 truncate">${ind.name}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-xl border border-gray-200 p-5">
                            <h3 class="text-sm font-semibold text-gray-700 mb-4">Sector Opportunity Map — Australia</h3>
                            <div class="grid grid-cols-8 gap-3">
                                ${stateData.map(s => `
                                    <div class="text-center p-4 rounded-xl bg-red-50 border border-red-100 hover:bg-red-100 cursor-pointer">
                                        <p class="text-lg font-bold text-red-700">${s.state}</p>
                                        <p class="text-xl font-black text-gray-900 mt-1">${s.leads}</p>
                                        <p class="text-xs text-gray-500">leads</p>
                                        <p class="text-sm font-bold text-red-600 mt-1">$${(s.value / 1000).toFixed(0)}K</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            renderKPICard(label, value, change, changeType, icon, color) {
                const iconColor = changeType === 'up' ? '#16A34A' : '#EF4444';
                const trendIcon = changeType === 'up' ? '📈' : '📉';
                return `
                    <div class="bg-white rounded-xl border border-gray-200 p-5 flex items-start justify-between">
                        <div>
                            <p class="text-sm text-gray-500 mb-1">${label}</p>
                            <p class="text-2xl font-bold text-gray-900">${value}</p>
                            ${change ? `
                                <div class="flex items-center gap-1 mt-2">
                                    <span style="color: ${iconColor}">${trendIcon}</span>
                                    <span class="text-xs font-medium" style="color: ${iconColor}">
                                        ${change} vs last month
                                    </span>
                                </div>
                            ` : ''}
                        </div>
                        <div class="p-3 rounded-lg text-2xl" style="background-color: ${color}15">
                            ${icon}
                        </div>
                    </div>
                `;
            }
        }

        // Initialize app
        new App();
    </script>
</body>
</html>
