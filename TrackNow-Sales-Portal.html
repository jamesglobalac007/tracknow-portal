<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackNow Sales Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Recharts & dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: #f9fafb;
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        svg.icon {
            display: inline-block;
        }
        .recharts-wrapper {
            outline: none;
        }
        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

    <script>
        // ─── SAMPLE DATA ───────────────────────────────────────────
        const INDUSTRIES = [
            { name: "Transport & Logistics", icon: "🚛", count: 0, color: "#DC2626" },
            { name: "Construction & Civil", icon: "🏗️", count: 0, color: "#B91C1C" },
            { name: "Waste Management", icon: "♻️", count: 0, color: "#991B1B" },
            { name: "Delivery & Couriers", icon: "📦", count: 0, color: "#7F1D1D" },
            { name: "Mining & Resources", icon: "⛏️", count: 0, color: "#450A0A" },
            { name: "Government & Council", icon: "🏛️", count: 0, color: "#1F2937" },
            { name: "Rental & Leasing", icon: "🔑", count: 0, color: "#374151" },
            { name: "Agriculture", icon: "🌾", count: 0, color: "#4B5563" },
        ];

        const STATES = ["All States", "QLD", "NSW", "VIC", "SA", "WA", "TAS", "NT", "ACT"];

        const PIPELINE_STAGES = [
            { id: "new", label: "New Lead", color: "#6B7280", bgColor: "#F3F4F6" },
            { id: "contacted", label: "Contacted", color: "#3B82F6", bgColor: "#EFF6FF" },
            { id: "interested", label: "Interested", color: "#F59E0B", bgColor: "#FFFBEB" },
            { id: "demo", label: "Demo Booked", color: "#8B5CF6", bgColor: "#F5F3FF" },
            { id: "proposal", label: "Proposal Sent", color: "#EC4899", bgColor: "#FDF2F8" },
            { id: "closed", label: "Closed Won", color: "#10B981", bgColor: "#ECFDF5" },
        ];

        const SAMPLE_LEADS = [];

        const SCRAPER_RESULTS = [];

        const monthlyData = [];

        const stateData = [
            { state: "QLD", leads: 0, value: 0 },
            { state: "NSW", leads: 0, value: 0 },
            { state: "VIC", leads: 0, value: 0 },
            { state: "WA", leads: 0, value: 0 },
            { state: "SA", leads: 0, value: 0 },
            { state: "NT", leads: 0, value: 0 },
            { state: "TAS", leads: 0, value: 0 },
            { state: "ACT", leads: 0, value: 0 },
        ];

        const campaigns = [];

        const INFO_PACKS = [
            { id: 1, name: "TrackNow System Overview", file: "TRACKNOWCORP-OVERVIEW.pdf", sends: 0, views: 0 },
            { id: 2, name: "Eco Driving Brochure", file: "TRACKNOWCORP-ECO-DRIVING.pdf", sends: 0, views: 0 },
            { id: 3, name: "Fleetrun Maintenance", file: "TRACKNOWCORP-FLEETRUN.pdf", sends: 0, views: 0 },
            { id: 4, name: "Custom Pricing Proposal", file: "Custom-Quote-Template.pdf", sends: 0, views: 0 },
        ];

        // Icon helper using HTML entities and emojis
        const icons = {
            dashboard: "📊", users: "👥", search: "🔍", send: "📤", chart: "📈",
            trending_up: "📈", trending_down: "📉", user_plus: "👤➕", mail: "✉️", phone: "☎️",
            mappin: "📍", building: "🏢", chevron_right: "▶", filter: "⚙️", download: "⬇️",
            eye: "👁️", clock: "🕐", check: "✅", x: "❌", alert: "⚠️", star: "⭐", globe: "🌐",
            truck: "🚛", hat: "🏗️", shield: "🛡️", fuel: "⛽", package: "📦", arrow: "→", plus: "➕",
            refresh: "🔄", target: "🎯", zap: "⚡", calendar: "📅", message: "💬", chevron_down: "▼",
            external: "🔗", copy: "📋", trash: "🗑️", edit: "✏️", more: "⋯", file: "📄"
        };

        // ─── STATE MANAGEMENT ───────────────────────────────────────────
        class App {
            constructor() {
                this.state = {
                    activePage: 'dashboard',
                    viewMode: 'board',
                    sidebarExpanded: true,
                    filterIndustry: 'All',
                    filterState: 'All States',
                    searchIndustry: 'Transport & Logistics',
                    searchState: 'QLD',
                    isSearching: false,
                    hasResults: false,
                    selectedResults: [],
                    outreachActiveTab: 'campaigns',
                    leads: SAMPLE_LEADS,
                };
                this.render();
                this.attachEventListeners();
            }

            setState(newState) {
                this.state = { ...this.state, ...newState };
                this.render();
                this.attachEventListeners();
            }

            attachEventListeners() {
                // Sidebar navigation
                document.querySelectorAll('[data-page]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.setState({ activePage: e.currentTarget.dataset.page });
                    });
                });

                // Sidebar collapse
                const collapseBtn = document.getElementById('collapse-sidebar');
                if (collapseBtn) {
                    collapseBtn.addEventListener('click', () => {
                        this.setState({ sidebarExpanded: !this.state.sidebarExpanded });
                    });
                }

                // Pipeline view mode
                document.querySelectorAll('[data-view-mode]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.setState({ viewMode: e.currentTarget.dataset.viewMode });
                    });
                });

                // Outreach tabs
                document.querySelectorAll('[data-outreach-tab]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.setState({ outreachActiveTab: e.currentTarget.dataset.outreachTab });
                    });
                });

                // Pipeline filters
                const industrySelect = document.getElementById('filter-industry');
                const stateSelect = document.getElementById('filter-state');
                if (industrySelect) {
                    industrySelect.addEventListener('change', (e) => {
                        this.setState({ filterIndustry: e.target.value });
                    });
                }
                if (stateSelect) {
                    stateSelect.addEventListener('change', (e) => {
                        this.setState({ filterState: e.target.value });
                    });
                }

                // Scraper search
                const searchBtn = document.getElementById('scraper-search-btn');
                if (searchBtn) {
                    searchBtn.addEventListener('click', () => {
                        this.setState({ isSearching: true });
                        setTimeout(() => {
                            this.setState({ isSearching: false, hasResults: true });
                        }, 1500);
                    });
                }

                // Scraper result checkboxes
                document.querySelectorAll('[data-result-checkbox]').forEach((cb, idx) => {
                    cb.addEventListener('change', () => {
                        const selected = this.state.selectedResults;
                        const newSelected = selected.includes(idx)
                            ? selected.filter(i => i !== idx)
                            : [...selected, idx];
                        this.setState({ selectedResults: newSelected });
                    });
                });

                // Select all scraper results
                const selectAllCheckbox = document.getElementById('select-all-results');
                if (selectAllCheckbox) {
                    selectAllCheckbox.addEventListener('change', () => {
                        if (this.state.selectedResults.length === SCRAPER_RESULTS.length) {
                            this.setState({ selectedResults: [] });
                        } else {
                            this.setState({ selectedResults: SCRAPER_RESULTS.map((_, i) => i) });
                        }
                    });
                }
            }

            render() {
                const app = document.getElementById('app');
                app.innerHTML = this.renderApp();
            }

            renderApp() {
                return `
                    <div class="flex h-screen bg-gray-50">
                        ${this.renderSidebar()}
                        ${this.renderMain()}
                    </div>
                `;
            }

            renderSidebar() {
                const expanded = this.state.sidebarExpanded;
                const activeClass = (id) => this.state.activePage === id ? 'bg-red-600 text-white' : 'text-gray-400 hover:text-white hover:bg-gray-800';

                return `
                    <div class="bg-gray-900 flex flex-col transition-all duration-300 ${expanded ? 'w-56' : 'w-16'} border-r border-gray-800">
                        <div class="p-4 border-b border-gray-800 flex items-center gap-2">
                            <div class="w-8 h-8 rounded-lg bg-red-600 flex items-center justify-center flex-shrink-0 text-white text-lg">
                                📍
                            </div>
                            ${expanded ? `
                                <div>
                                    <p class="text-sm font-black text-white tracking-wide">TRACK<span class="text-red-500">NOW</span></p>
                                    <p class="text-[9px] text-gray-500 uppercase tracking-widest">Sales Portal</p>
                                </div>
                            ` : ''}
                        </div>

                        <nav class="flex-1 py-4 px-2 space-y-1">
                            <button data-page="dashboard" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeClass('dashboard')}">
                                <span class="text-lg">📊</span>
                                ${expanded ? '<span>Dashboard</span>' : ''}
                            </button>
                            <button data-page="pipeline" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeClass('pipeline')}">
                                <span class="text-lg">👥</span>
                                ${expanded ? '<span>Pipeline</span>' : ''}
                            </button>
                            <button data-page="scraper" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeClass('scraper')}">
                                <span class="text-lg">🔍</span>
                                ${expanded ? '<span>Lead Scraper</span>' : ''}
                            </button>
                            <button data-page="outreach" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeClass('outreach')}">
                                <span class="text-lg">📤</span>
                                ${expanded ? '<span>Outreach</span>' : ''}
                            </button>
                            <button data-page="analytics" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeClass('analytics')}">
                                <span class="text-lg">📈</span>
                                ${expanded ? '<span>Analytics</span>' : ''}
                            </button>
                        </nav>

                        <div class="p-3 border-t border-gray-800">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">MS</div>
                                ${expanded ? `
                                    <div class="min-w-0">
                                        <p class="text-xs font-semibold text-white truncate">Mark Speelmeyer</p>
                                        <p class="text-[10px] text-gray-500 truncate">Managing Director</p>
                                    </div>
                                ` : ''}
                            </div>
                            ${expanded ? `
                                <div class="flex items-center gap-2 mt-3">
                                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">JG</div>
                                    <div class="min-w-0">
                                        <p class="text-xs font-semibold text-white truncate">James</p>
                                        <p class="text-[10px] text-gray-500 truncate">Partner</p>
                                    </div>
                                </div>
                            ` : ''}
                        </div>

                        <button id="collapse-sidebar" class="p-3 border-t border-gray-800 text-gray-500 hover:text-white text-xs text-center w-full">
                            ${expanded ? '◀ Collapse' : '▶'}
                        </button>
                    </div>
                `;
            }

            renderMain() {
                return `
                    <div class="flex-1 flex flex-col overflow-hidden">
                        ${this.renderTopBar()}
                        <div class="flex-1 overflow-auto">
                            <div class="p-6">
                                ${this.renderCurrentPage()}
                            </div>
                        </div>
                    </div>
                `;
            }

            renderTopBar() {
                return `
                    <div class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-10">
                        <div class="flex items-center gap-3">
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
                                <input type="text" placeholder="Search leads, companies, contacts..." class="pl-9 pr-4 py-2 text-sm border border-gray-200 rounded-lg w-80 bg-gray-50 focus:bg-white focus:border-red-300 focus:outline-none transition-colors">
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <a href="#" class="flex items-center gap-1.5 text-xs text-gray-500 hover:text-red-600 transition-colors">
                                🌐 gps.tracknowcorp.com 🔗
                            </a>
                            <button class="relative p-2 rounded-lg hover:bg-gray-100 text-gray-500">
                                ⚠️
                                <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
                            </button>
                            <span class="text-xs text-gray-400">31 Mar 2026</span>
                        </div>
                    </div>
                `;
            }

            renderCurrentPage() {
                switch(this.state.activePage) {
                    case 'dashboard': return this.renderDashboard();
                    case 'pipeline': return this.renderPipeline();
                    case 'scraper': return this.renderScraper();
                    case 'outreach': return this.renderOutreach();
                    case 'analytics': return this.renderAnalytics();
                    default: return '<div>Page not found</div>';
                }
            }

            renderDashboard() {
                const leads = this.state.leads;
                const totalPipeline = leads.reduce((sum, l) => sum + l.value, 0);
                const closedLeads = leads.filter(l => l.stage === "closed");
                const closedValue = closedLeads.reduce((sum, l) => sum + l.value, 0);
                const totalVehicles = leads.reduce((sum, l) => sum + l.vehicles, 0);

                return `
                    <div class="space-y-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
                                <p class="text-sm text-gray-500 mt-1">Welcome back. Here's your sales overview for March 2026.</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-gray-500 bg-gray-100 px-3 py-1.5 rounded-lg">Last updated: Just now</span>
                                <button class="flex items-center gap-2 px-4 py-2 bg-red-600 text-white text-sm font-medium rounded-lg hover:bg-red-700">
                                    ➕ Add Lead
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-4 gap-4">
                            ${this.renderKPICard('Total Leads', leads.length, '+18%', 'up', '👥', '#DC2626')}
                            ${this.renderKPICard('Pipeline Value', `$${(totalPipeline / 1000).toFixed(0)}K`, '+24%', 'up', '🎯', '#3B82F6')}
                            ${this.renderKPICard('Closed This Month', closedLeads.length, '+67%', 'up', '✅', '#10B981')}
                            ${this.renderKPICard('Total Units Tracked', totalVehicles.toLocaleString(), '+12%', 'up', '🚛', '#8B5CF6')}
                        </div>

                        <div class="grid grid-cols-3 gap-4">
                            <div class="col-span-2 bg-white rounded-xl border border-gray-200 p-5">
                                <h3 class="text-sm font-semibold text-gray-700 mb-4">Monthly Lead Performance</h3>
                                <div class="h-72 bg-gray-50 rounded-lg flex items-center justify-center text-gray-500">
                                    <span>📊 Chart: Monthly leads trend</span>
                                </div>
                            </div>
                            <div class="bg-white rounded-xl border border-gray-200 p-5">
                                <h3 class="text-sm font-semibold text-gray-700 mb-4">Pipeline Breakdown</h3>
                                <div class="h-48 bg-gray-50 rounded-lg flex items-center justify-center text-gray-500 mb-4">
                                    <span>📊 Pie Chart</span>
                                </div>
                                <div class="space-y-2">
                                    ${PIPELINE_STAGES.map(s => {
                                        const count = leads.filter(l => l.stage === s.id).length;
                                        return `
                                            <div class="flex items-center justify-between text-xs">
                                                <div class="flex items-center gap-2">
                                                    <div class="w-2.5 h-2.5 rounded-full" style="background-color: ${s.color}"></div>
                                                    <span class="text-gray-600">${s.label}</span>
                                                </div>
                                                <span class="font-semibold text-gray-900">${count}</span>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white rounded-xl border border-gray-200 p-5">
                                <h3 class="text-sm font-semibold text-gray-700 mb-4">Hot Leads — Requiring Action</h3>
                                <div class="space-y-3">
                                    ${leads.filter(l => l.starred && l.stage !== "closed").slice(0, 5).map(lead => {
                                        const stage = PIPELINE_STAGES.find(s => s.id === lead.stage);
                                        return `
                                            <div class="flex items-center gap-3 p-3 rounded-lg bg-gray-50 hover:bg-gray-100 cursor-pointer">
                                                <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-red-600 font-bold text-sm">
                                                    ${lead.company.charAt(0)}
                                                </div>
                                                <div class="flex-1 min-w-0">
                                                    <p class="text-sm font-semibold text-gray-900 truncate">${lead.company}</p>
                                                    <p class="text-xs text-gray-500">${lead.vehicles} vehicles · $${lead.value.toLocaleString()}</p>
                                                </div>
                                                <span class="text-xs px-2 py-1 rounded-full" style="background-color: ${stage.bgColor}; color: ${stage.color}">
                                                    ${stage.label}
                                                </span>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                            <div class="bg-white rounded-xl border border-gray-200 p-5">
                                <h3 class="text-sm font-semibold text-gray-700 mb-4">Recent Activity</h3>
                                <div class="space-y-4">
                                    <p class="text-xs text-gray-400">No recent activity</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderPipeline() {
                const leads = this.state.leads;
                const filteredLeads = leads.filter(l => {
                    if (this.state.filterIndustry !== 'All' && l.industry !== this.state.filterIndustry) return false;
                    if (this.state.filterState !== 'All States' && l.state !== this.state.filterState) return false;
                    return true;
                });
                const totalValue = filteredLeads.reduce((s, l) => s + l.value, 0);

                return `
                    <div class="space-y-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <h1 class="text-2xl font-bold text-gray-900">Sales Pipeline</h1>
                                <p class="text-sm text-gray-500 mt-1">${filteredLeads.length} leads · $${totalValue.toLocaleString()} total value</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <select id="filter-industry" class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-600 bg-white">
                                    <option value="All">All Industries</option>
                                    ${INDUSTRIES.map(i => `<option value="${i.name}">${i.name}</option>`).join('')}
                                </select>
                                <select id="filter-state" class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-600 bg-white">
                                    ${STATES.map(s => `<option value="${s}">${s}</option>`).join('')}
                                </select>
                                <div class="flex bg-gray-100 rounded-lg p-0.5">
                                    <button data-view-mode="board" class="px-3 py-1.5 text-xs font-medium rounded-md transition-colors ${this.state.viewMode === 'board' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500'}">Board</button>
                                    <button data-view-mode="table" class="px-3 py-1.5 text-xs font-medium rounded-md transition-colors ${this.state.viewMode === 'table' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500'}">Table</button>
                                </div>
                                <button class="flex items-center gap-2 px-4 py-2 bg-red-600 text-white text-sm font-medium rounded-lg hover:bg-red-700">
                                    ➕ Add Lead
                                </button>
                            </div>
                        </div>

                        ${this.state.viewMode === 'board' ? this.renderBoardView(filteredLeads) : this.renderTableView(filteredLeads)}
                    </div>
                `;
            }

            renderBoardView(leads) {
                return `
                    <div class="flex gap-3 overflow-x-auto pb-4">
                        ${PIPELINE_STAGES.map(stage => {
                            const stageLeads = leads.filter(l => l.stage === stage.id);
                            return `
                                <div class="flex-1 min-w-[220px]">
                                    <div class="flex items-center gap-2 mb-3 px-1">
                                        <div class="w-3 h-3 rounded-full" style="background-color: ${stage.color}"></div>
                                        <span class="text-sm font-semibold text-gray-700">${stage.label}</span>
                                        <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full ml-auto">${stageLeads.length}</span>
                                    </div>
                                    <div class="space-y-2 min-h-[200px] rounded-lg p-2" style="background-color: ${stage.bgColor}">
                                        ${stageLeads.map(lead => `
                                            <div class="bg-white rounded-lg p-3 border border-gray-100 shadow-sm cursor-pointer hover:shadow-md">
                                                <div class="flex items-start justify-between mb-1">
                                                    <p class="text-sm font-semibold text-gray-900">${lead.company}</p>
                                                    ${lead.starred ? '<span class="text-lg">⭐</span>' : ''}
                                                </div>
                                                <p class="text-xs text-gray-500 mb-2">${lead.contact}</p>
                                                <div class="flex items-center gap-1 text-xs text-gray-400 mb-2">
                                                    📍 ${lead.city}, ${lead.state}
                                                </div>
                                                <div class="flex items-center justify-between">
                                                    <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-red-50 text-red-700">${lead.vehicles} units</span>
                                                    <span class="text-xs font-bold text-gray-700">$${lead.value.toLocaleString()}</span>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            renderTableView(leads) {
                return `
                    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                        <table class="w-full">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200">
                                    <th class="text-left text-xs font-semibold text-gray-500 uppercase py-3 px-4">Company</th>
                                    <th class="text-left text-xs font-semibold text-gray-500 uppercase py-3 px-4">Industry</th>
                                    <th class="text-left text-xs font-semibold text-gray-500 uppercase py-3 px-4">Location</th>
                                    <th class="text-left text-xs font-semibold text-gray-500 uppercase py-3 px-4">Stage</th>
                                    <th class="text-left text-xs font-semibold text-gray-500 uppercase py-3 px-4">Vehicles</th>

                            </div>
                        </div>
                    </div>
                `;
            }

            renderKPICard(label, value, change, changeType, icon, color) {
                const iconColor = changeType === 'up' ? '#16A34A' : '#EF4444';
                const trendIcon = changeType === 'up' ? '📈' : '📉';
                return `
                    <div class="bg-white rounded-xl border border-gray-200 p-5 flex items-start justify-between">
                        <div>
                            <p class="text-sm text-gray-500 mb-1">${label}</p>
                            <p class="text-2xl font-bold text-gray-900">${value}</p>
                            ${change ? `
                                <div class="flex items-center gap-1 mt-2">
                                    <span style="color: ${iconColor}">${trendIcon}</span>
                                    <span class="text-xs font-medium" style="color: ${iconColor}">
                                        ${change} vs last month
                                    </span>
                                </div>
                            ` : ''}
                        </div>
                        <div class="p-3 rounded-lg text-2xl" style="background-color: ${color}15">
                            ${icon}
                        </div>
                    </div>
                `;
            }
        }

        // Initialize app
        new App();
    </script>
</body>
</html>
