<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackNow – Mark's Portal Access</title>
<script>
  // Legacy hard-coded credentials from this shortcut used to break Mark's
  // login every time he clicked the bookmark — they'd blow away any real
  // session. Zap any leftover key on page load so the main portal starts
  // fresh when he goes there.
  try {
    localStorage.removeItem('tn_creds');
    sessionStorage.removeItem('tn_auth');
  } catch(e){}
  // Auto-forward to the real portal so stale bookmarks still work.
  setTimeout(function(){ window.location.href = '/'; }, 800);
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }
  .logo {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .logo span { color: #6366f1; }
  .tagline {
    color: rgba(255,255,255,0.45);
    font-size: 13px;
    margin-bottom: 28px;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.88; }
  .note {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    margin-top: 22px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Track<span>Now</span></div>
  <div class="tagline">Sales &amp; Marketing Portal</div>
  <a class="btn" href="/">Open TrackNow Portal</a>
  <div class="note">Taking you to the live portal. Log in with your own email + password.</div>
</div>
</body>
</html>
