<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackNow – Mark's Portal Access</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }
  .logo {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .logo span { color: #6366f1; }
  .tagline {
    color: rgba(255,255,255,0.45);
    font-size: 13px;
    margin-bottom: 36px;
  }
  .avatar {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    margin: 0 auto 16px;
  }
  .welcome {
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .sub {
    color: rgba(255,255,255,0.45);
    font-size: 13px;
    margin-bottom: 32px;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.88; }
  .note {
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    margin-top: 20px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Track<span>Now</span></div>
  <div class="tagline">GPS Fleet Tracking Portal</div>
  <div class="avatar">M</div>
  <div class="welcome">Welcome, Mark</div>
  <div class="sub">Click below to open your portal</div>
  <a class="btn" href="#" onclick="launch(); return false;">Open TrackNow Portal →</a>
  <div class="note">Keep this file in the same folder as the portal</div>
</div>

<script>
function launch() {
  // Pre-set login in localStorage so portal opens straight in
  localStorage.setItem('tn_creds', JSON.stringify({
    email: 'marktracknow',
    pass: 'tracknow2026',
    remember: true
  }));
  window.location.href = 'TrackNow-Portal-v5.html';
}
</script>
</body>
</html>
